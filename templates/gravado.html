<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Envio</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f7fb; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .box { background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; }
        .btn { display: inline-block; background-color: #2c3e50; color: white; padding: 14px 25px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Status da Operação</h2>
        <p>{{ status }}</p>
        <a href="/" class="btn">Voltar para o Painel</a>
    </div>
</body>
</html>
