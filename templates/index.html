<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário Ciclare</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        h1 { text-align: center; }
        .material-link { 
            display: block; 
            padding: 15px; 
            margin: 10px 0; 
            background-color: #f4f4f4; 
            text-decoration: none; 
            color: #333; 
            border-radius: 8px; 
            font-size: 18px; 
            text-align: center;
        }
        .btn-finalizar { 
            display: block; 
            padding: 20px; 
            background-color: #28a745; 
            color: white; 
            text-align: center; 
            margin-top: 30px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>Triagem Ciclare</h1>

    {% for mat in materiais %}
        <a href="/selecionar/{{ mat }}" class="material-link">{{ mat }}</a>
    {% endfor %}

    <a href="/baixar_resumo" class="btn-finalizar">
        Baixar Resumo e Finalizar Triagem
    </a>

</body>
</html>
