<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="max-age=3600, must-revalidate">
    <title>Triagem Ciclare</title>
    <style>
        body { font-family: sans-serif; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .material-link { display: flex; align-items: center; justify-content: center; height: 100px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; text-align: center; border: 1px solid #ccc; }
        .btn-finalizar { display: block; padding: 20px; background: #28a745; color: white; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="grid">
        {% for mat in materiais %}
            <a href="/selecionar/{{ mat }}" class="material-link">{{ mat }}</a>
        {% endfor %}
    </div>
    <a href="/baixar_resumo" class="btn-finalizar">BAIXAR RESUMO</a>
</body>
</html>
