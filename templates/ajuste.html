<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuste - {{ material }}</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .qtd { font-size: 3em; color: #28a745; margin: 20px 0; }
        .btn { display: inline-block; width: 45%; padding: 30px 0; font-size: 1.2em; border-radius: 8px; text-decoration: none; color: white; margin: 5px; }
    </style>
</head>
<body>
    <h1>{{ material }}</h1>
    <div class="qtd">{{ qtd_atual }} {{ unidade }}</div>
    
    <form action="/atualizar" method="POST">
        <input type="hidden" name="material" value="{{ material }}">
        <button name="operacao" value="subtrair" class="btn" style="background:#e67e22;">-</button>
        <button name="operacao" value="somar" class="btn" style="background:#2980b9;">+</button>
    </form>
    
    <br><br>
    <a href="/" style="font-size: 1.2em;">← Voltar ao Painel</a>
</body>
</html>
