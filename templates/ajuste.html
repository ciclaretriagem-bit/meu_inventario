<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustar Material</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f7fb; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .box { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #2c3e50; margin-top: 0; }
        .qtd { font-size: 40px; font-weight: bold; color: #27ae60; margin: 20px 0; }
        
        /* Container dos botões quadrados lado a lado */
        .container-acoes { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        
        .btn-acao { 
            width: 120px; 
            height: 120px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }
        
        .btn-subtrair { background-color: #e67e22; }
        .btn-somar { background-color: #2980b9; }
        
        /* Campo invisível apenas para carregar o valor "1" padrão */
        input[type="hidden"] { display: none; }
        
        .voltar { display: block; margin-top: 40px; color: #7f8c8d; text-decoration: none; font-size: 16px; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>{{ material }}</h2>
        <div class="qtd">{{ qtd_atual }} kg</div>
        
        <form action="/atualizar" method="POST">
            <input type="hidden" name="material" value="{{ material }}">
            <input type="hidden" name="valor" value="1">
            
            <div class="container-acoes">
                <button type="submit" name="operacao" value="subtrair" class="btn-acao btn-subtrair">
                    <span style="font-size: 40px;">-</span><br>SUBTRAIR
                </button>
                <button type="submit" name="operacao" value="somar" class="btn-acao btn-somar">
                    <span style="font-size: 40px;">+</span><br>ADICIONAR
                </button>
            </div>
        </form>
        
        <a href="/" class="voltar">← Voltar ao Painel</a>
    </div>
</body>
</html>
